# Ref: https://github.com/mostlygeek/llama-swap/blob/main/docs/configuration.md

# levels: debug, info, warn, error
logLevel: info  

# sendLoadingState: inject loading status updates into the reasoning (thinking) field
# - when true, a stream of loading messages will be sent to the client in the
#   reasoning field so chat UIs can show that loading is in progress.
sendLoadingState: true

# globalTTL: the default TTL in seconds before unloading a model
# - optional, default: 0 (never automatically unload)
# - must be >= 0
globalTTL: 300

#llama-server flags
#--port ${PORT} 
#--model /models/path <model_path_local>
#--ctx-size 131072    <model_context_window>
#--no-mmproj-offload  <keep the mmproj file on CPU RAM>
#--gpu-layers 999     <full GPU offload (if VRAM allows)>
#--flash-attn on      <faster attention on/off/auto(default)>
#--temprature 1       <sampling temperature>
#--cache-type-kv q4_0 <KV cache optimization (key+value)>
#--cache-type-k q8_0  <KV cache optimization (key)>
#--cache-type-v q8_0  <KV cache optimization (value)>
#--jinja              <enable chat templating>
#--no-mmap true       <disable mmap (better for Docker sometimes)>
#--no-warmup          <faster startup (no prefill)>

models:
  Qwen3.5:4B-UD-Q4_K_XL:
    name: "Qwen3.5:4B"
    cmd: |
      llama-server 
      --port ${PORT} 
      --model /models/models--unsloth--Qwen3.5-4B-GGUF/snapshots/e87f176479d0855a907a41277aca2f8ee7a09523/Qwen3.5-4B-UD-Q4_K_XL.gguf
      --mmproj /models/models--unsloth--Qwen3.5-4B-GGUF/snapshots/e87f176479d0855a907a41277aca2f8ee7a09523/mmproj-BF16.gguf
      --ctx-size 150000
      --no-mmproj-offload
      --gpu-layers 999
      --no-warmup
