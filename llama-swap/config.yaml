# Ref: https://github.com/mostlygeek/llama-swap/blob/main/docs/configuration.md

logLevel: info  # levels: debug, info, warn, error

models:
  Qwen3.5-Uncensored:4B-Q4_K_M:
    name: "Qwen3.5-Uncensored:4B"
    cmd: |
      llama-server 
      --port ${PORT} 
      --model /models/models--HauhauCS--Qwen3.5-4B-Uncensored-HauhauCS-Aggressive/snapshots/c09cdbcdb1fefad6d335809d445621b5f5ba0c6e/Qwen3.5-4B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf 
      --mmproj /models/models--HauhauCS--Qwen3.5-4B-Uncensored-HauhauCS-Aggressive/snapshots/c09cdbcdb1fefad6d335809d445621b5f5ba0c6e/mmproj-Qwen3.5-4B-Uncensored-HauhauCS-Aggressive-BF16.gguf
      #--served-model-name "Qwen3.5-Uncensored:4B-Q4_K_M"
      --ctx-size 100000
      --gpu-layers 999
      #--jinja
      #--temprature 0.6
      #--top-k 40
      #--top-p 0.95
      #--cache-type-k q8_0  
      #--cache-type-v q8_0
      --no-warmup
    ttl: 300    
    
