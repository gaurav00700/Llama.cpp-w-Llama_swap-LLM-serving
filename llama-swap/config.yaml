# This section enables to run multiple models at the same time
# Expansion examples:
#   "L"                  → [L]
#   "a & b"              → [a, b]
#   "a | b"              → [a], [b]
#   "(a | b) & c"        → [a, c], [b, c]
#   "(a | b) & (c | d)"  → [a,c], [a,d], [b,c], [b,d]
matrix:
  vars:
    l1: Qwen3.5:4B-UD-Q4_K_XL
    l2: Qwen3.5-Uncensored:4B-Q4_K_M
    l3: Llama3.1:8B-UD-Q4_K_XL
    l4: Gemma4:E2B-UD-Q6_K_XL
    l5: Gemma4:E4B-UD-Q4_K_XL
    l6: Gemma4-Uncensored:E4B-Q4_K_M
    e1: GemmaEmbedding:300M-f32
    
  # evict_costs: relative cost of losing a running model (default: 1)
  #evict_costs:
  #  l1: 50 # vllm backend, slow cold start
  #  l2: 30 # 70B weights, slow to load
    
  # Expansion examples:
  #   "a"                  → [a]
  #   "a & b"              → [a, b]
  #   "a | b"              → [a], [b]
  #   "(a | b) & c"        → [a, c], [b, c]
  #   "(a | b) & c & d"    → [a, c, d], [b, c, d]
  #   "(a | b) & (c | d)"  → [a,c], [a,d], [b,c], [b,d]
  sets:
    llm_with_embedding: "(l1 | l2 | l3 | l4 | l5 | l6) & e1"
    #llm: "l1 | l2 | l3 | l4 | l5 | l6"

# Preload model on startup so it is ready immediately
